apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: bitwarden-secrets
  namespace: bitwarden
spec:
  releaseName: bitwarden-secrets
  chart:
    spec:
      chart: bitwarden-secrets
      version: "2025.2.0"  # Adjust based on the available version
      sourceRef:
        kind: HelmRepository
        name: bitwarden-secrets-repo
        namespace: flux-system
  interval: 5m
  values:
    ingress:
      enabled: true
      host: secrets.${SECRET_DOMAIN}
    service:
      type: ClusterIP
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 8Gi
